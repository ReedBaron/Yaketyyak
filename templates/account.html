<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — Yakety Yak Pro</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --surface: #0d1117;
            --border: #1e2a3a;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #22d3a7;
            --pro-gold: #f0b429;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container { max-width: 560px; width: 100%; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }
        .lookup-form {
            display: flex;
            gap: 8px;
            margin-bottom: 2rem;
        }
        .lookup-form input {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        .lookup-form input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .lookup-form input::placeholder { color: var(--text-dim); }
        .lookup-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .lookup-btn:hover { opacity: 0.85; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .info-item {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
        }
        .info-label {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }
        .info-val {
            font-size: 1rem;
            font-weight: 600;
        }
        .info-val.active { color: var(--accent); }
        .info-val.canceled { color: #f85149; }
        .info-val.past_due { color: var(--pro-gold); }
        .usage-bar-wrap {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .usage-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .usage-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .usage-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.5s;
        }
        .actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text);
            background: transparent;
            transition: border-color 0.2s;
        }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); }
        .action-btn.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .activate-section { margin-bottom: 1.5rem; }
        .hidden { display: none !important; }
        .error-msg { color: #f85149; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Account</h1>

            <div id="lookup-view">
                <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1rem;">Enter the email you used to purchase Pro.</p>
                <form class="lookup-form" id="lookup-form">
                    <input type="email" id="email-input" placeholder="your@email.com" autocomplete="email">
                    <button type="submit" class="lookup-btn">Look Up</button>
                </form>
                <div id="lookup-error" class="error-msg hidden"></div>
                <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 1rem;">Don't have Pro yet? <a href="/#download" style="color: var(--accent);">Get Yakety Yak Pro</a></p>
            </div>

            <div id="account-view" class="hidden">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Plan</div>
                        <div class="info-val" id="info-plan"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Status</div>
                        <div class="info-val" id="info-status"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Email</div>
                        <div class="info-val" id="info-email" style="font-size: 0.85rem;"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Account</div>
                        <div class="info-val" id="info-key" style="font-size: 0.8rem;"></div>
                    </div>
                </div>

                <div class="usage-bar-wrap">
                    <div class="usage-label">
                        <span>Translations this month</span>
                        <span id="usage-text">0 / 500</span>
                    </div>
                    <div class="usage-bar">
                        <div class="usage-fill" id="usage-fill" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="activate-section" id="activate-section">
                    <div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem;">Sign in from the app:</div>
                    <div style="display: flex; align-items: center; gap: 8px; background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;">
                        <code style="flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--accent); word-break: break-all;">login <span id="activate-key"></span></code>
                        <button style="background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); padding: 4px 10px; font-size: 0.75rem; cursor: pointer; white-space: nowrap;" onclick="copyActivateCmd()">Copy</button>
                    </div>
                    <p style="color: var(--text-dim); font-size: 0.75rem; margin-top: 0.5rem;">Type this in Yakety Yak to enable cloud AI translations.</p>
                </div>

                <div style="background: #000; border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem;" id="download-section">
                    <div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem;">Need the app?</div>
                    <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                        <a href="#" id="dl-auto-acct" style="display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #000; border-radius: 6px; padding: 6px 14px; font-weight: 600; font-size: 0.8rem; text-decoration: none;">Download</a>
                        <span style="color: var(--text-dim); font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem;">
                            <a href="#" id="dl-mac-acct" style="color: var(--accent); text-decoration: none; font-size: 0.8rem;">macOS</a>
                            <a href="#" id="dl-linux-acct" style="color: var(--accent); text-decoration: none; font-size: 0.8rem;">Linux</a>
                            <a href="#" id="dl-win-acct" style="color: var(--accent); text-decoration: none; font-size: 0.8rem;">Windows</a>
                        </span>
                    </div>
                </div>

                <div class="actions">
                    <button class="action-btn primary" id="portal-btn" onclick="openPortal()">Manage Subscription</button>
                    <a href="/" class="action-btn">Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script>
    var REPO = 'myiephero/Yaketyyak';
    var RELEASE_BASE = 'https://github.com/' + REPO + '/releases/latest/download/';
    var RELEASES_PAGE = 'https://github.com/' + REPO + '/releases/latest';
    var currentKey = '';

    (function() {
        var params = new URLSearchParams(window.location.search);
        var emailFromUrl = params.get('email');
        var emailFromStorage = '';
        try { emailFromStorage = localStorage.getItem('yakety_pro_email') || ''; } catch(e) {}

        var autoEmail = emailFromUrl || emailFromStorage;
        if (autoEmail) {
            document.getElementById('email-input').value = autoEmail;
            lookupByEmail(autoEmail);
        }

        if (emailFromUrl) {
            try { history.replaceState(null, '', '/account'); } catch(e) {}
        }

        setupDownloads();
    })();

    function setupDownloads() {
        var ua = navigator.userAgent.toLowerCase();
        var dlName = '';
        var label = 'Download';

        if (ua.indexOf('mac') !== -1) { dlName = 'yakety-yak-macos'; label = 'Download for macOS'; }
        else if (ua.indexOf('win') !== -1) { dlName = 'yakety-yak-windows.exe'; label = 'Download for Windows'; }
        else if (ua.indexOf('linux') !== -1) { dlName = 'yakety-yak-linux'; label = 'Download for Linux'; }

        var autoBtn = document.getElementById('dl-auto-acct');
        if (dlName) {
            autoBtn.href = RELEASE_BASE + dlName;
            autoBtn.textContent = label;
        } else {
            autoBtn.href = RELEASES_PAGE;
            autoBtn.textContent = 'Download from GitHub';
        }

        document.getElementById('dl-mac-acct').href = RELEASE_BASE + 'yakety-yak-macos';
        document.getElementById('dl-linux-acct').href = RELEASE_BASE + 'yakety-yak-linux';
        document.getElementById('dl-win-acct').href = RELEASE_BASE + 'yakety-yak-windows.exe';
    }

    document.getElementById('lookup-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email-input').value.trim();
        if (!email) return;
        lookupByEmail(email);
    });

    function lookupByEmail(email) {
        fetch('/api/activate-by-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email }),
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                document.getElementById('lookup-error').textContent = data.error;
                document.getElementById('lookup-error').classList.remove('hidden');
                return;
            }

            document.getElementById('lookup-error').classList.add('hidden');
            currentKey = data.license_key;

            var planName = data.plan === 'pro_yearly' ? 'Pro (Yearly)' : 'Pro (Monthly)';
            document.getElementById('info-plan').textContent = planName;

            var statusEl = document.getElementById('info-status');
            statusEl.textContent = data.status;
            statusEl.className = 'info-val ' + data.status;

            document.getElementById('info-email').textContent = data.email;
            document.getElementById('info-key').textContent = data.email;
            document.getElementById('activate-key').textContent = data.email;

            var used = data.usage.translations_this_month;
            var limit = data.usage.limit;
            document.getElementById('usage-text').textContent = used + ' / ' + limit;
            document.getElementById('usage-fill').style.width = Math.min((used / limit) * 100, 100) + '%';

            try { localStorage.setItem('yakety_pro_email', email); } catch(e) {}

            document.getElementById('lookup-view').classList.add('hidden');
            document.getElementById('account-view').classList.remove('hidden');
        })
        .catch(function() {
            document.getElementById('lookup-error').textContent = 'Network error. Please try again.';
            document.getElementById('lookup-error').classList.remove('hidden');
        });
    }

    function openPortal() {
        fetch('/api/portal', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ license_key: currentKey }),
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.url) {
                window.location.href = data.url;
            } else {
                alert(data.error || 'Could not open billing portal.');
            }
        })
        .catch(function() {
            alert('Network error. Please try again.');
        });
    }

    function clipCopy(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text);
        }
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        return Promise.resolve();
    }

    function copyActivateCmd() {
        var email = document.getElementById('activate-key').textContent;
        var cmd = 'login ' + email;
        var btn = document.querySelector('[onclick="copyActivateCmd()"]');
        clipCopy(cmd).then(function() {
            btn.textContent = 'Copied!';
            btn.style.color = 'var(--accent)';
            btn.style.borderColor = 'var(--accent)';
            setTimeout(function() {
                btn.textContent = 'Copy';
                btn.style.color = '';
                btn.style.borderColor = '';
            }, 2000);
        }).catch(function() {});
    }
    </script>
</body>
</html>
